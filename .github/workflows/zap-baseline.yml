# ============================================================
# DAST Scan (OWASP ZAP Baseline)
# ------------------------------------------------------------
# 用途：對 ap-staging 跑 OWASP ZAP Baseline 被動掃描
# 觸發：手動 (workflow_dispatch) — 進 Actions 分頁點 Run workflow
# 對應檢核項：050402（弱點掃描）、070101（漏洞修復狀態）
# 設計者：Yamei + Claude  |  版本：v1.1  |  日期：2026/06/10
# ------------------------------------------------------------
# 安裝位置（請放到 Taiwan Select Repo）：
#   .github/workflows/zap-baseline.yml
# ============================================================

name: DAST Scan (OWASP ZAP Baseline)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '要掃描的網址（含 https://）'
        required: true
        type: string
        default: 'https://ap-staging.taitra.org.tw'

permissions:
  contents: read
  actions: write          # 上傳 ZAP 掃描報告 artifact

jobs:
  zap_baseline:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        # 直接用 Docker 跑掃描，避開 zaproxy/action-baseline 內建 artifact 上傳 API 相容性問題
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/zap/wrk/:rw" \
            -t ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${{ github.event.inputs.target_url }}" \
            -r report_html.html \
            -J report_json.json \
            -w report_md.md \
            -a -j \
            || true
        shell: bash

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-scan-${{ github.run_id }}
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30
          if-no-files-found: warn

      - name: Show artifact location
        if: always()
        run: |
          echo "::notice::ZAP 掃描完成。請到本次 run 頁面最下方 Artifacts 下載 'zap-scan-${{ github.run_id }}'，解壓後開 report_html.html 看報告。"
