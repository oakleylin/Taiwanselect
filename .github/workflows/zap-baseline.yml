# ============================================================
# DAST Scan (OWASP ZAP Baseline)
# ------------------------------------------------------------
# 用途：對 ap-staging 跑 OWASP ZAP Baseline 被動掃描
# 觸發：手動 (workflow_dispatch) — 進 Actions 分頁點 Run workflow
# 對應檢核項：050402（弱點掃描）、070101（漏洞修復狀態）
# 參考：zap-full-scan.yml（action-af + upload-artifact@v4）
# ============================================================

name: DAST Scan (OWASP ZAP Baseline)

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: '要掃描的網址（含 https://），留空則使用 ZAP_TARGET_STAGING 或預設值'
        required: false
        default: ''

jobs:
  zap-baseline-scan:
    name: OWASP ZAP Baseline Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      issues: write
    env:
      ZAP_TARGET: ${{ github.event.inputs.target_url != '' && github.event.inputs.target_url || (vars.ZAP_TARGET_STAGING != '' && vars.ZAP_TARGET_STAGING || 'https://ap-staging.taitra.org.tw') }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fix workspace permissions for ZAP
        run: chmod -R a+w .

      - name: Create ZAP baseline plan
        run: |
          mkdir -p .zap
          cat > .zap/baseline-scan.yaml <<'YAML'
          env:
            contexts:
              - name: baseline
                urls:
                  - ${ZAP_TARGET}
            parameters:
              failOnError: false
              failOnWarning: false
              progressToStdout: true
          jobs:
            - type: spider
              parameters:
                url: ${ZAP_TARGET}
                maxDuration: 5
            - type: spiderAjax
              parameters:
                url: ${ZAP_TARGET}
                maxDuration: 5
            - type: passiveScan-wait
              parameters:
                maxDuration: 10
            - type: report
              parameters:
                template: traditional-html
                reportDir: /zap/wrk
                reportFile: report_html
                reportTitle: ZAP Baseline Scanning Report
          YAML

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-af@v0.2.0
        with:
          plan: .zap/baseline-scan.yaml
          docker_env_vars: |
            ZAP_TARGET

      - name: Upload ZAP baseline scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-baseline-report
          path: |
            report_html*
            report_md.md
          retention-days: 30

      - name: Show artifact location
        if: always()
        run: |
          echo "::notice::ZAP 掃描完成（目標：${ZAP_TARGET}）。請到本次 run 頁面最下方 Artifacts 下載 'zap-baseline-report'，解壓後開 report_html.html 看報告。"
