name: Deploy to HubSpot

# ──────────────────────────────────────────────
# 觸發條件：
#   - push 到 main 分支時自動執行
#   - 也可在 GitHub Actions 頁面手動觸發
# ──────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest

    steps:
      # ── Step 1：取出程式碼 ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2：設定 Node.js 環境 ───────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 3：安裝 HubSpot CLI（鎖定與本地相同版本） ──
      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@8.2.0

      # ── Step 4：（選用）安裝專案依賴並打包 ─────
      # 若你的主題不需要 build 步驟，可將此區塊刪除
      # - name: Install dependencies & build
      #   run: |
      #     npm install
      #     npm run build

      # ── Step 5：寫入 HubSpot 驗證設定 ──────────
      # 只寫到 ~/.hscli/config.yml，避免與專案根目錄衝突
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          mkdir -p "$HOME/.hscli"
          printf 'defaultPortal: taitra\nportals:\n  - name: taitra\n    portalId: %s\n    authType: personalaccesskey\n    personalAccessKey: %s\n' \
            "${HUBSPOT_PORTAL_ID}" \
            "${HUBSPOT_PERSONAL_ACCESS_KEY}" \
            > "$HOME/.hscli/config.yml"

          echo "✅ Config written to ~/.hscli/config.yml"
          echo "--- Content preview (key masked) ---"
          sed 's/personalAccessKey:.*/personalAccessKey: ***MASKED***/' "$HOME/.hscli/config.yml"

      # ── Step 6：上傳主題到 HubSpot CMS ──────────
      # 將本地 taiwan-select-theme 資料夾推送到
      # HubSpot Design Manager 的 AP-TEAM/Projects/staging 路徑
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs upload taiwan-select-theme AP-TEAM/Projects/staging \
            --portal-id "${HUBSPOT_PORTAL_ID}"
