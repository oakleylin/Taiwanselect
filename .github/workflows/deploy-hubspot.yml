name: Deploy to HubSpot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@8.2.0

      # ── 寫入設定檔（CLI v8 正確格式，用 Python 避開 heredoc 縮排問題） ──
      # CLI v8 使用: defaultAccount / accounts / accountId
      # 必須有 auth.tokenInfo，否則 upload 指令會 crash
      # expiresAt 設為過去時間，讓 CLI 用 personalAccessKey 自動刷新 token
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          mkdir -p "$HOME/.hscli"

          python3 -c "
          import os, pathlib
          pak = os.environ['HUBSPOT_PERSONAL_ACCESS_KEY']
          pid = os.environ['HUBSPOT_PORTAL_ID']
          lines = [
              'defaultAccount: taitra',
              'accounts:',
              '  - name: taitra',
              '    accountId: ' + pid,
              '    env: prod',
              '    authType: personalaccesskey',
              '    accountType: STANDARD',
              '    personalAccessKey: ' + pak,
              '    auth:',
              '      tokenInfo:',
              '        accessToken: \"\"',
              '        expiresAt: \"2000-01-01T00:00:00.000Z\"',
          ]
          cfg = pathlib.Path.home() / '.hscli' / 'config.yml'
          cfg.write_text('\n'.join(lines) + '\n')
          print('Config written to', cfg)
          "

          echo "=== config.yml (key masked) ==="
          sed 's/personalAccessKey:.*/personalAccessKey: ***MASKED***/' "$HOME/.hscli/config.yml"

          echo "=== hs accounts list ==="
          hs accounts list || echo "[WARN] hs accounts list 失敗"

      # ── 上傳主題 ──
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs cms upload . AP-TEAM/Projects/staging \
            --account taitra
