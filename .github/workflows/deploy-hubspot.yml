name: Deploy to HubSpot

# ──────────────────────────────────────────────
# 觸發條件：
#   - push 到 main 分支時自動執行
#   - 也可在 GitHub Actions 頁面手動觸發
# ──────────────────────────────────────────────
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest

    steps:
      # ── Step 1：取出程式碼 ──────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2：設定 Node.js 環境 ───────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 3：安裝 HubSpot CLI ────────────────
      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli

      # ── Step 4：（選用）安裝專案依賴並打包 ─────
      # 若你的主題不需要 build 步驟，可將此區塊刪除
      # - name: Install dependencies & build
      #   run: |
      #     npm install
      #     npm run build

      # ── Step 5：寫入 HubSpot 驗證設定 ──────────
      # CLI v8+ 優先讀取專案根目錄的 hubspot.config.yml
      # 同時也寫入 ~/.hscli/config.yml 作為備用
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          CONFIG_CONTENT="defaultPortal: taitra
          portals:
            - name: taitra
              portalId: ${HUBSPOT_PORTAL_ID}
              authType: personalaccesskey
              personalAccessKey: ${HUBSPOT_PERSONAL_ACCESS_KEY}"

          # 寫入專案根目錄（CLI v8+ 優先讀取此位置）
          printf 'defaultPortal: taitra\nportals:\n  - name: taitra\n    portalId: %s\n    authType: personalaccesskey\n    personalAccessKey: %s\n' \
            "${HUBSPOT_PORTAL_ID}" "${HUBSPOT_PERSONAL_ACCESS_KEY}" \
            > hubspot.config.yml

          # 同時寫入 ~/.hscli/（舊版 CLI 備用）
          mkdir -p "$HOME/.hscli"
          cp hubspot.config.yml "$HOME/.hscli/config.yml"

          echo "✅ hubspot.config.yml written to project root and ~/.hscli/"
          echo "--- Config preview (key masked) ---"
          sed 's/personalAccessKey:.*/personalAccessKey: ***MASKED***/' hubspot.config.yml

      # ── Step 6：上傳主題到 HubSpot CMS ──────────
      # 將本地 taiwan-select-theme 資料夾推送到
      # HubSpot Design Manager 的 AP-TEAM/Projects/staging 路徑
      # 注意：CLI v8+ 使用 `hs upload`，舊版使用 `hs cms upload`
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs upload taiwan-select-theme AP-TEAM/Projects/staging \
            --account taitra
