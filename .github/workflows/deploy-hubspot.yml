name: Deploy to HubSpot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════
  # Job 1：SAST 安全掃描（部署前先跑）
  # ════════════════════════════════════════════
  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # 讓 CodeQL 能上傳掃描結果到 GitHub Security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0        # Gitleaks 需要完整 git history 才能掃所有 commits

      # ── Gitleaks：掃描是否有 secret/API Key 被 commit ──
      - name: Gitleaks - Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── CodeQL：掃描 JavaScript 程式碼漏洞（XSS、injection 等）──
      - name: CodeQL - Initialize
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality   # 同時跑安全 + 品質規則

      - name: CodeQL - Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ════════════════════════════════════════════
  # Job 2：部署到 HubSpot（SAST 通過後才執行）
  # ════════════════════════════════════════════
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest
    needs: sast                # 等 SAST job 成功才執行部署

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@8.2.0

      # ── 寫入設定檔（CLI v8 正確格式，用 Python 避開 heredoc 縮排問題） ──
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          mkdir -p "$HOME/.hscli"

          python3 -c "
          import os, pathlib
          pak = os.environ['HUBSPOT_PERSONAL_ACCESS_KEY']
          pid = os.environ['HUBSPOT_PORTAL_ID']
          lines = [
              'defaultAccount: taitra',
              'accounts:',
              '  - name: taitra',
              '    accountId: ' + pid,
              '    env: prod',
              '    authType: personalaccesskey',
              '    accountType: STANDARD',
              '    personalAccessKey: ' + pak,
              '    auth:',
              '      tokenInfo:',
              '        accessToken: \"\"',
              '        expiresAt: \"2000-01-01T00:00:00.000Z\"',
          ]
          cfg = pathlib.Path.home() / '.hscli' / 'config.yml'
          cfg.write_text('\n'.join(lines) + '\n')
          print('Config written to', cfg)
          "

      # ── 上傳主題到 HubSpot CMS ──
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs cms upload . AP-TEAM/Projects/staging/taiwan-select-theme \
            --account taitra
