name: Deploy to HubSpot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@8.2.0

      # ── 寫入設定檔（使用 CLI v8 正確格式） ──────────
      # 本機 config 使用 defaultAccount / accounts / accountId
      # 且必須有 auth.tokenInfo 區塊，否則 CLI 會 crash
      # expiresAt 設為過去時間，讓 CLI 使用 personalAccessKey 重新取得 token
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          mkdir -p "$HOME/.hscli"

          cat > "$HOME/.hscli/config.yml" << HSEOF
          defaultAccount: taitra
          accounts:
            - name: taitra
              accountId: ${HUBSPOT_PORTAL_ID}
              env: prod
              authType: personalaccesskey
              accountType: STANDARD
              personalAccessKey: ${HUBSPOT_PERSONAL_ACCESS_KEY}
              auth:
                tokenInfo:
                  accessToken: ''
                  expiresAt: '2000-01-01T00:00:00.000Z'
          HSEOF

          # 同時複製到專案根目錄
          cp "$HOME/.hscli/config.yml" hubspot.config.yml

          echo "=== config.yml (key masked) ==="
          sed 's/personalAccessKey:.*/personalAccessKey: ***MASKED***/' "$HOME/.hscli/config.yml"

          echo "=== hs accounts list ==="
          hs accounts list || echo "[WARN] hs accounts list 失敗"

      # ── 上傳主題 ──
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs upload taiwan-select-theme AP-TEAM/Projects/staging \
            --account taitra
