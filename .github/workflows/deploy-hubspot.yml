name: Deploy to HubSpot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Upload Theme to HubSpot CMS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@8.2.0

      # ── 寫入設定檔到兩個位置，並驗證帳號是否正確載入 ──
      - name: Configure HubSpot CLI authentication
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          mkdir -p "$HOME/.hscli"

          # 使用 printf 寫入 ~/.hscli/config.yml
          printf 'defaultPortal: taitra\nportals:\n  - name: taitra\n    portalId: %s\n    authType: personalaccesskey\n    personalAccessKey: %s\n' \
            "${HUBSPOT_PORTAL_ID}" \
            "${HUBSPOT_PERSONAL_ACCESS_KEY}" \
            > "$HOME/.hscli/config.yml"

          # 同時複製到專案根目錄（CLI v8+ 優先讀此位置）
          cp "$HOME/.hscli/config.yml" hubspot.config.yml

          echo "=== ~/.hscli/config.yml (key masked) ==="
          sed 's/personalAccessKey:.*/personalAccessKey: ***MASKED***/' "$HOME/.hscli/config.yml"

          echo "=== hs accounts list (驗證帳號是否正確載入) ==="
          hs accounts list || echo "[WARN] hs accounts list 執行失敗"

      # ── 上傳主題 ──
      - name: Upload theme to HubSpot Design Manager
        env:
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
        run: |
          hs upload taiwan-select-theme AP-TEAM/Projects/staging \
            --account taitra
