name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  HUBSPOT_THEME_NAME: AP-TEAM/Projects/taiwan-select-theme

jobs:
  # ════════════════════════════════════════════
  # Job 1：SAST 安全掃描（Gitleaks + CodeQL）
  # ════════════════════════════════════════════
  sast:
    name: SAST Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks - Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: CodeQL - Initialize
        uses: github/codeql-action/init@v3
        with:
          languages: javascript
          queries: security-and-quality

      - name: CodeQL - Perform analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript"

  # ════════════════════════════════════════════
  # Job 2：SonarQube 品質掃描（SAST 通過後）
  # ════════════════════════════════════════════
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: sast
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: SonarQube Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # ════════════════════════════════════════════
  # Job 3：部署到 HubSpot Sandbox（僅 push to main）
  # 需在 GitHub Settings > Environments > sandbox 設定對應的 secrets
  # ════════════════════════════════════════════
  deploy-sandbox:
    name: Deploy to HubSpot Sandbox
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: sandbox

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@4

      - name: Upload theme to HubSpot Sandbox
        env:
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
        run: |
          hs upload . ${{ env.HUBSPOT_THEME_NAME }} --use-env

  # ════════════════════════════════════════════
  # Job 4：部署到 HubSpot Production（Sandbox 通過後）
  # 需在 GitHub Settings > Environments > production 設定對應的 secrets
  # ════════════════════════════════════════════
  deploy-production:
    name: Deploy to HubSpot Production
    runs-on: ubuntu-latest
    needs: deploy-sandbox
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install HubSpot CLI
        run: npm install -g @hubspot/cli@4

      - name: Upload theme to HubSpot Production
        env:
          HUBSPOT_PORTAL_ID: ${{ secrets.HUBSPOT_PORTAL_ID }}
          HUBSPOT_PERSONAL_ACCESS_KEY: ${{ secrets.HUBSPOT_PERSONAL_ACCESS_KEY }}
        run: |
          hs upload . ${{ env.HUBSPOT_THEME_NAME }} --use-env
