<div class="custom-footer-nav">
  <div class="footer-nav-inner">
    
    {# 導覽列連結迴圈 #}
    <div class="footer-links">
      {% for item in module.footer_nav_bar %}
        {% if item.url_field.open_in_new_tab %}
        <a href="{{ item.url_field.href }}" class="footer-link" target="_blank" rel="noopener noreferrer{% if item.url_field.rel %} {{ item.url_field.rel }}{% endif %}">
        {% elif item.url_field.rel %}
        <a href="{{ item.url_field.href }}" class="footer-link" rel="{{ item.url_field.rel }}">
        {% else %}
        <a href="{{ item.url_field.href }}" class="footer-link">
        {% endif %}
          {{ item.text_field }}
        </a>
      {% endfor %}
    </div>

    {# 回到最上方按鈕 #}
    <button type="button" class="back-to-top" id="backToTopBtn" aria-label="回到最上方">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>

  </div>
</div>
