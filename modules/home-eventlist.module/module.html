<div class="custom-half-hero">
  <div class="half-hero-content">
    <h1 class="half-hero-title">TAIWAN SELECT</h1>
    <h2 class="half-hero-subtitle">活動列表</h2>
    
    {% if module.link_field.url.href %}
      {% if module.link_field.open_in_new_tab %}
      <a href="{{ module.link_field.url.href }}" class="half-hero-btn" target="_blank" rel="noopener noreferrer{% if module.link_field.no_follow %} nofollow{% endif %}">
      {% elif module.link_field.no_follow %}
      <a href="{{ module.link_field.url.href }}" class="half-hero-btn" rel="nofollow">
      {% else %}
      <a href="{{ module.link_field.url.href }}" class="half-hero-btn">
      {% endif %}
        {{ module.link_field.link_text || "VIEW MORE" }}
      </a>
    {% endif %}
  </div>
</div>
